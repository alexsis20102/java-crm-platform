name: CRM CD (Docker Hub)

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
          cache: maven

      - name: Build Maven project
        run: mvn clean package -DskipTests

      # ======================
      # Docker Login (Docker Hub)
      # ======================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ======================
      # Image prefix
      # ======================
      - name: Set image prefix
        run: echo "IMAGE_PREFIX=${{ secrets.DOCKER_USERNAME }}/crm" >> $GITHUB_ENV

      # ======================
      # Eureka
      # ======================
      - name: Build & Push Eureka
        run: |
          docker build -t $IMAGE_PREFIX/eureka-server:latest ./infrastructure/eureka-server
          docker push $IMAGE_PREFIX/eureka-server:latest

      # ======================
      # Config Server
      # ======================
      - name: Build & Push Config Server
        run: |
          docker build -t $IMAGE_PREFIX/config-server:latest ./infrastructure/config-server
          docker push $IMAGE_PREFIX/config-server:latest

      # ======================
      # Gateway
      # ======================
      - name: Build & Push Gateway
        run: |
          docker build -t $IMAGE_PREFIX/api-gateway:latest ./infrastructure/api-gateway
          docker push $IMAGE_PREFIX/api-gateway:latest

      # ======================
      # User Service
      # ======================
      - name: Build & Push User Service
        run: |
          docker build -t $IMAGE_PREFIX/user-service:latest ./services/user-service
          docker push $IMAGE_PREFIX/user-service:latest

      # ======================
      # Auth Service
      # ======================
      - name: Build & Push Auth Service
        run: |
          docker build -t $IMAGE_PREFIX/auth-service:latest ./services/auth-service
          docker push $IMAGE_PREFIX/auth-service:latest

      # ======================
      # Customer Service
      # ======================
      - name: Build & Push Customer Service
        run: |
          docker build -t $IMAGE_PREFIX/customer-service:latest ./services/customer-service
          docker push $IMAGE_PREFIX/customer-service:latest