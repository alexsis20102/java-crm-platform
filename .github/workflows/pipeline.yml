name: CRM CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  # ======================
  # CI STAGE
  # ======================
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
          cache: maven

      - name: Run tests
        run: mvn clean test

      - name: Build project
        run: mvn clean package -DskipTests


  # ======================
  # CD STAGE
  # ======================
  cd:
    runs-on: ubuntu-latest
    needs: ci   # 👈 ВАЖНО: запускается только если CI успешен

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set image prefix
        run: echo "IMAGE_PREFIX=${{ secrets.DOCKER_USERNAME }}/javarestapi" >> $GITHUB_ENV

      # ======================
      # Docker builds
      # ======================

      - name: Build & Push Gateway
        run: |
          docker build -t $IMAGE_PREFIX/api-gateway:latest -f infrastructure/api-gateway/Dockerfile .
          docker push $IMAGE_PREFIX/api-gateway:latest

      - name: Build & Push Config Server
        run: |
          docker build -t $IMAGE_PREFIX/config-server:latest -f infrastructure/config-server/Dockerfile .
          docker push $IMAGE_PREFIX/config-server:latest

      - name: Build & Push Eureka
        run: |
          docker build -t $IMAGE_PREFIX/eureka-server:latest -f infrastructure/eureka-server/Dockerfile .
          docker push $IMAGE_PREFIX/eureka-server:latest

      - name: Build & Push User Service
        run: |
          docker build -t $IMAGE_PREFIX/user-service:latest -f services/user-service/Dockerfile .
          docker push $IMAGE_PREFIX/user-service:latest

      - name: Build & Push Auth Service
        run: |
          docker build -t $IMAGE_PREFIX/auth-service:latest -f services/auth-service/Dockerfile .
          docker push $IMAGE_PREFIX/auth-service:latest

      - name: Build & Push Billing Service
        run: |
          docker build -t $IMAGE_PREFIX/billing-service:latest -f services/billing-service/Dockerfile .
          docker push $IMAGE_PREFIX/billing-service:latest  

      - name: Build & Push Customer Service
        run: |
          docker build -t $IMAGE_PREFIX/customer-service:latest -f services/customer-service/Dockerfile .
          docker push $IMAGE_PREFIX/customer-service:latest 

      - name: Build & Push Notification Service
        run: |
          docker build -t $IMAGE_PREFIX/notification-service:latest -f services/notification-service/Dockerfile .
          docker push $IMAGE_PREFIX/notification-service:latest

      - name: Build & Push Order Service
        run: |
          docker build -t $IMAGE_PREFIX/order-service:latest -f services/order-service/Dockerfile .
          docker push $IMAGE_PREFIX/order-service:latest

      - name: Build & Push Product Service
        run: |
          docker build -t $IMAGE_PREFIX/product-service:latest -f services/product-service/Dockerfile .
          docker push $IMAGE_PREFIX/product-service:latest

      - name: Build & Push Logging Service
        run: |
          docker build -t $IMAGE_PREFIX/logging-service:latest -f logging-service/Dockerfile .
          docker push $IMAGE_PREFIX/logging-service:latest
