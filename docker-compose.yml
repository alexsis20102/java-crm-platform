version: '3.8'

services:

  # ======================
  # MySQL
  # ======================
  mysql:
    image: mysql:8.0
    container_name: crm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: crm-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - crm-network

  # ======================
  # Eureka Server
  # ======================
  eureka-server:
    build:
      context: .
      dockerfile: infrastructure/eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - crm-network

  # ======================
  # Config Server
  # ======================
  config-server:
    build:
      context: .
      dockerfile: infrastructure/config-server/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    networks:
      - crm-network

  # ======================
  # API Gateway
  # ======================
  api-gateway:
    build:
      context: .
      dockerfile: infrastructure/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8088:8088"
    depends_on:
      - eureka-server
      - config-server
    networks:
      - crm-network

  # ======================
  # User Service
  # ======================
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/users_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - crm-network

  # ======================
  # Auth Service
  # ======================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      - user-service
      - eureka-server
      - config-server
    networks:
      - crm-network

# ======================
# Network
# ======================
networks:
  crm-network:
    driver: bridge